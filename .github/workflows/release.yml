name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '25'

      - name: Build bootJar
        run: ./gradlew :app:bootJar

      - name: Upload JAR
        uses: actions/upload-artifact@v6
        with:
          name: jar
          path: build/libs/selah-*.jar

  build-runtime:
    name: Build Runtime (${{ matrix.os-label }})
    strategy:
      matrix:
        include:
          - runner: macos-14          # Apple Silicon
            os-label: macos-aarch64
          - runner: ubuntu-latest
            os-label: linux-x64
          - runner: ubuntu-24.04-arm  # Raspberry Pi 등 ARM Linux
            os-label: linux-aarch64
          - runner: windows-latest
            os-label: windows-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '25'

      - name: Build jlink runtime
        run: ./gradlew :app:packageRuntime
        shell: bash

      - name: Upload runtime (tar.gz)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: runtime-${{ matrix.os-label }}
          path: build/selah-runtime-*.tar.gz

      - name: Upload runtime (zip)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: runtime-${{ matrix.os-label }}
          path: build/selah-runtime-*.zip

  release:
    name: Create Release
    needs: [build-jar, build-runtime]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          name: v${{ steps.version.outputs.version }}
          generateReleaseNotes: true
          artifacts: "artifacts/jar/selah-*.jar,artifacts/runtime-*/selah-runtime-*"
